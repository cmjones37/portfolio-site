  <link rel="stylesheet" href="styles.css">

  <style>
    /*
      WATERCOLOUR BOTANICAL SYSTEM
      ─────────────────────────────
      The key to convincing watercolour in SVG:
        1. Multiple overlapping shapes with low opacity (0.04–0.18)
        2. feGaussianBlur softens every layer into a bloom
        3. feTurbulence adds organic variation — no two washes are equal
        4. Shapes are gestural, NOT precise — loose ellipses, free-form paths
        5. Colours layer on each other like real pigment blooms:
           sage on parchment bleeds into teal, teal bleeds into moss

      Plant forms are SUGGESTED, not illustrated:
        - Leaf shapes are loose ovals and flowing paths
        - Veins are thin strokes, barely visible
        - The overall impression is "there is a plant here"
          not "here is a diagram of a plant"
    */

    .wc-canvas svg {
      position: absolute;
      overflow: visible;
    }

    /* Right side — main botanical composition */
    .wc-main {
      right: -80px;
      top: -60px;
      width: 620px;
      height: 720px;
      opacity: 1;
      animation: wc-sway 18s ease-in-out infinite alternate;
      transform-origin: 60% 90%;
    }
    @keyframes wc-sway {
      from { transform: rotate(-1.5deg) scale(1); }
      to   { transform: rotate(1.5deg) scale(1.025); }
    }

    /* Bottom-left — secondary, smaller composition */
    .wc-secondary {
      left: -60px;
      bottom: -24px;
      width: 400px;
      height: 480px;
      opacity: 1;
      transform: scaleX(-1) rotate(-8deg);
      animation: wc-sway-b 22s ease-in-out infinite alternate-reverse;
      transform-origin: 40% 80%;
    }
    @keyframes wc-sway-b {
      from { transform: scaleX(-1) rotate(-6deg) scale(1); }
      to   { transform: scaleX(-1) rotate(-10deg) scale(1.03); }
    }

    /* In dark mode, reduce opacity slightly */
    [data-theme="dark"] .wc-main { opacity: 0.7; }
    [data-theme="dark"] .wc-secondary { opacity: 0.6; }

    /* Responsive botanical scaling/positioning */
    @media (max-width: 1200px) {
      .wc-main {
        right: -130px;
        top: -50px;
        width: 560px;
        height: 660px;
      }
      .wc-secondary {
        left: -85px;
        bottom: -14px;
        width: 350px;
        height: 430px;
      }
    }

    @media (max-width: 992px) {
      .wc-main {
        right: -185px;
        top: -40px;
        width: 500px;
        height: 600px;
        opacity: 0.88;
      }
      .wc-secondary {
        left: -105px;
        bottom: -4px;
        width: 300px;
        height: 370px;
        opacity: 0.8;
      }
    }

    @media (max-width: 768px) {
      .wc-main {
        right: -215px;
        top: 35px;
        width: 430px;
        height: 510px;
        opacity: 0.6;
      }
      .wc-secondary {
        left: -76px;
        bottom: 12px;
        width: 250px;
        height: 305px;
        opacity: 0.54;
      }
    }

    @media (max-width: 560px) {
      .wc-main {
        right: -230px;
        top: 58px;
        width: 385px;
        height: 455px;
        opacity: 0.46;
      }
      .wc-secondary {
        left: -68px;
        bottom: 24px;
        width: 210px;
        height: 260px;
        opacity: 0.42;
      }
    }
  </style>
